# Сборка на трёх ОС + job publish: прикрепляет .exe / .msi / .dmg / .deb / AppImage к GitHub Release.
# Версия релиза берётся из apps/desktop-host/package.json — держи её в ногу с src-tauri/tauri.conf.json и Cargo.toml.
# main → релиз v{version}; dev → prerelease v{version}-dev

name: Desktop release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/desktop-host/package-lock.json
            apps/obs-overlay/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-host/src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies (obs-overlay)
        run: npm ci
        working-directory: apps/obs-overlay

      - name: Install npm dependencies (desktop-host)
        run: npm ci
        working-directory: apps/desktop-host

      - name: Build Tauri
        run: npx tauri build
        working-directory: apps/desktop-host
        env:
          CI: true

      - name: Upload Windows installers
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            apps/desktop-host/src-tauri/target/release/bundle/**/*.exe
            apps/desktop-host/src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: error

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: apps/desktop-host/src-tauri/target/release/bundle/**/*.dmg
          if-no-files-found: error

      - name: Upload Linux packages
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: |
            apps/desktop-host/src-tauri/target/release/bundle/**/*.deb
            apps/desktop-host/src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: tauri-*
          merge-multiple: true

      - name: List files
        run: find release -type f

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          REPO="${{ github.repository }}"

          VERSION=$(node -p "require('./apps/desktop-host/package.json').version")
          if [ "$REF_NAME" = "dev" ]; then
            TITLE="${VERSION}-dev"
            TAG="v${VERSION}-dev"
            VER_LABEL="${VERSION}-dev"
            PRERELEASE=(--prerelease)
          else
            TITLE="${VERSION}"
            TAG="v${VERSION}"
            VER_LABEL="${VERSION}"
            PRERELEASE=()
          fi

          gh release delete "$TAG" --repo "$REPO" --yes 2>/dev/null || true
          gh api --method DELETE -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/git/refs/tags/$TAG" 2>/dev/null || true

          mapfile -t FILES_RAW < <(find release -type f \( \
            -name '*.dmg' -o -name '*.exe' -o -name '*.msi' -o -name '*.deb' -o -name '*.AppImage' \
          \) | sort)
          if [ ${#FILES_RAW[@]} -eq 0 ]; then
            echo "No installer files (.dmg/.exe/.msi/.deb/.AppImage) under release/"; exit 1
          fi

          mkdir -p release-upload
          for f in "${FILES_RAW[@]}"; do
            case "${f,,}" in
              *.dmg) out="HockeyDesktopHostMacOS${VER_LABEL}.dmg" ;;
              *.exe) out="HockeyDesktopHostWindows${VER_LABEL}.exe" ;;
              *.msi) out="HockeyDesktopHostWindows${VER_LABEL}.msi" ;;
              *.deb) out="HockeyDesktopHostLinux${VER_LABEL}.deb" ;;
              *.appimage) out="HockeyDesktopHostLinux${VER_LABEL}.AppImage" ;;
              *) out="HockeyDesktopHost_${VER_LABEL}_$(basename "$f")" ;;
            esac
            cp "$f" "release-upload/$out"
          done
          mapfile -t FILES < <(find release-upload -maxdepth 1 -type f | sort)

          NOTES="Сборки для Windows, Linux и macOS. Версия: ${VER_LABEL}."

          gh release create "$TAG" \
            --repo "$REPO" \
            --target "${{ github.sha }}" \
            --title "$TITLE" \
            --notes "$NOTES" \
            "${PRERELEASE[@]}" \
            "${FILES[@]}"
