# CI: сборка + Artifacts в Actions (скачивание — как zip-обёртка от GitHub).
# Release: при push тега v* тот же билд прикрепляет .exe / .dmg / .deb / AppImage к GitHub Release.
#
# Как выпустить версию: выровнять version в apps/desktop-host/src-tauri/tauri.conf.json (и при необходимости
# Cargo.toml), затем: git tag v0.1.0 && git push origin v0.1.0

name: Tauri build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apps/desktop-host/**"
      - "apps/obs-overlay/**"
      - "packages/shared/**"
      - ".github/workflows/tauri-build.yml"

concurrency:
  group: tauri-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # write нужен только для загрузки файлов в Release при теге v*; на обычных push в main токен не публикует релизы.
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-22.04
          - os: macos-latest

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/desktop-host/package-lock.json
            apps/obs-overlay/package-lock.json

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-host/src-tauri

      - name: Install npm dependencies (obs-overlay)
        run: npm ci
        working-directory: apps/obs-overlay

      - name: Install npm dependencies (desktop-host)
        run: npm ci
        working-directory: apps/desktop-host

      # Без тега: только билд и артефакт в Actions.
      - name: Tauri build (CI)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npx tauri build
        working-directory: apps/desktop-host

      # С тегом v*: билд и прикрепление установщиков к GitHub Release (не только zip исходников).
      - name: Tauri build & publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-host
          tagName: ${{ github.ref_name }}
          releaseName: "Hockey Desktop Host ${{ github.ref_name }}"
          releaseBody: "Установщики для Windows (NSIS / MSI), Linux (deb / AppImage), macOS (DMG / .app)."
          releaseDraft: false
          prerelease: false

      - name: Upload bundle (CI only)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: hockey-desktop-host-${{ matrix.os }}
          path: apps/desktop-host/src-tauri/target/release/bundle/
          if-no-files-found: error
