name: Desktop release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/desktop-host/package-lock.json
            apps/obs-overlay/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-host/src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies (obs-overlay)
        run: npm ci
        working-directory: apps/obs-overlay

      - name: Install npm dependencies (desktop-host)
        run: npm ci
        working-directory: apps/desktop-host

      - name: Build Tauri
        run: npx tauri build
        working-directory: apps/desktop-host
        env:
          CI: true

      - name: Upload bundles
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.os }}
          path: |
            apps/desktop-host/src-tauri/target/release/bundle/**/*.exe
            apps/desktop-host/src-tauri/target/release/bundle/**/*.msi
            apps/desktop-host/src-tauri/target/release/bundle/**/*.dmg
            apps/desktop-host/src-tauri/target/release/bundle/**/*.deb
            apps/desktop-host/src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: error
          compression-level: 0   

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Download all bundles
        uses: actions/download-artifact@v8
        with:
          path: release
          pattern: tauri-*
          merge-multiple: true

      - name: List downloaded files
        run: find release -type f

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          VERSION=$(node -p "require('./apps/desktop-host/package.json').version")

          if [ "$REF_NAME" = "dev" ]; then
            TAG="v${VERSION}-dev"
            TITLE="${VERSION}-dev"
            PRERELEASE="--prerelease"
          else
            TAG="v${VERSION}"
            TITLE="${VERSION}"
            PRERELEASE=""
          fi

          # Удаляем старый релиз с этим тегом (если есть)
          gh release delete "$TAG" --repo "$REPO" --yes 2>/dev/null || true
          gh api --method DELETE "/repos/$REPO/git/refs/tags/$TAG" 2>/dev/null || true

          # Собираем файлы
          mkdir -p release-upload
          find release -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' \) | while read -r f; do
            basename=$(basename "$f")
            case "${basename,,}" in
              *.dmg)   out="HockeyDesktopHost_MacOS_${VERSION}.dmg" ;;
              *.exe)   out="HockeyDesktopHost_Windows_${VERSION}.exe" ;;
              *.msi)   out="HockeyDesktopHost_Windows_${VERSION}.msi" ;;
              *.deb)   out="HockeyDesktopHost_Linux_${VERSION}.deb" ;;
              *.appimage) out="HockeyDesktopHost_Linux_${VERSION}.AppImage" ;;
              *)       out="HockeyDesktopHost_${VERSION}_${basename}" ;;
            esac
            cp "$f" "release-upload/$out"
          done

          NOTES="Автоматическая сборка Tauri приложения. Версия: ${VERSION} (${REF_NAME})"

          gh release create "$TAG" \
            --repo "$REPO" \
            --target "${{ github.sha }}" \
            --title "$TITLE" \
            --notes "$NOTES" \
            $PRERELEASE \
            release-upload/*